<style>
:root{
  --bg1: #070714;
  --bg2: #0d0d24;
  --glass-bg: rgba(255,255,255,0.07);
  --glass-bg-hover: rgba(255,255,255,0.11);
  --glass-border: rgba(255,255,255,0.14);
  --glass-border-bright: rgba(255,255,255,0.28);
  --glass-shine: rgba(255,255,255,0.55);
  --blur: blur(24px) saturate(180%);
  --blur-heavy: blur(40px) saturate(200%);
  --text: #f0f0ff;
  --text2: rgba(240,240,255,0.62);
  --text3: rgba(240,240,255,0.35);
  --accent: #4fa8ff;
  --accent2: #a78bfa;
  --accent3: #34d399;
  --red: #ff5e5e;
  --radius: 20px;
  --radius-lg: 28px;
  --radius-pill: 100px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  min-height:100dvh;
  background:var(--bg1);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  overscroll-behavior:none;
  overflow-x:hidden;
}

/* ANIMATED BACKGROUND */
.bg-orbs{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
.orb{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:0.35;
  animation:drift 20s ease-in-out infinite;
}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#3b82f6,transparent 70%);top:-100px;left:-100px;animation-delay:0s;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#8b5cf6,transparent 70%);top:30%;right:-80px;animation-delay:-7s;}
.orb3{width:350px;height:350px;background:radial-gradient(circle,#06b6d4,transparent 70%);bottom:10%;left:20%;animation-delay:-14s;}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-40px) scale(1.05);}
  66%{transform:translate(-20px,30px) scale(0.97);}
}

/* LAYOUT */
#app{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;}

/* HEADER */
header{
  position:sticky;top:0;z-index:50;
  padding:env(safe-area-inset-top,0) 0 0;
}
.header-glass{
  margin:10px 12px 0;
  background:var(--glass-bg);
  backdrop-filter:var(--blur-heavy);
  -webkit-backdrop-filter:var(--blur-heavy);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 var(--glass-shine);
}
.header-top{
  display:flex;align-items:center;gap:12px;padding:14px 16px 10px;
}
.logo-mark{
  width:38px;height:38px;
  background:linear-gradient(135deg,rgba(79,168,255,0.9),rgba(167,139,250,0.9));
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:white;
  box-shadow:0 4px 16px rgba(79,168,255,0.35), inset 0 1px 0 rgba(255,255,255,0.4);
  flex-shrink:0;
}
.header-text{flex:1;}
.header-text h1{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.3px;}
.header-text p{font-size:11px;color:var(--text3);margin-top:1px;}
.search-row{padding:0 12px 12px;}
.search-pill{
  display:flex;align-items:center;gap:0;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-pill);
  overflow:hidden;
  transition:border-color 0.2s,background 0.2s;
}
.search-pill:focus-within{
  border-color:var(--glass-border-bright);
  background:rgba(255,255,255,0.1);
}
.search-pill span{padding:0 12px;font-size:16px;color:var(--text3);flex-shrink:0;}
.search-pill input{
  flex:1;padding:11px 4px;font-size:14px;
  font-family:'Outfit',sans-serif;
  background:transparent;border:none;outline:none;
  color:var(--text);
}
.search-pill input::placeholder{color:var(--text3);}
.search-pill button{
  padding:8px 16px;margin:4px;
  background:linear-gradient(135deg,rgba(79,168,255,0.8),rgba(167,139,250,0.8));
  color:white;border:none;
  border-radius:var(--radius-pill);
  font-size:13px;font-family:'Outfit',sans-serif;font-weight:600;
  cursor:pointer;white-space:nowrap;
  box-shadow:0 2px 8px rgba(79,168,255,0.3);
  transition:opacity 0.15s;
}
.search-pill button:active{opacity:0.8;}

/* MAIN */
main{flex:1;padding:14px 12px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px);max-width:840px;margin:0 auto;width:100%;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
.card{
  background:var(--glass-bg);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s, background 0.2s;
  box-shadow:0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  position:relative;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,transparent 60%);
  pointer-events:none;border-radius:inherit;
}
.card:hover{
  transform:translateY(-3px) scale(1.01);
  border-color:var(--glass-border-bright);
  background:var(--glass-bg-hover);
}
.card:active{transform:scale(0.97);}
.card-img{width:100%;aspect-ratio:1;object-fit:contain;background:rgba(255,255,255,0.04);padding:12px;display:block;}
.card-img-ph{width:100%;aspect-ratio:1;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:40px;}
.card-body{padding:10px 12px 14px;}
.card-num{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:0.8px;text-transform:uppercase;}
.card-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.35;margin-top:3px;}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;}
.pill{
  padding:2px 8px;border-radius:var(--radius-pill);font-size:10px;font-weight:600;
  background:rgba(79,168,255,0.15);color:var(--accent);
  border:1px solid rgba(79,168,255,0.25);
}
.pill-year{background:rgba(167,139,250,0.12);color:var(--accent2);border-color:rgba(167,139,250,0.2);}

/* LOADER */
.loader{grid-column:1/-1;text-align:center;padding:4rem 1rem;}
.loader-text{color:var(--text3);font-size:14px;margin-top:16px;}
.spin{
  width:36px;height:36px;margin:0 auto;
  border:2px solid rgba(255,255,255,0.1);
  border-top:2px solid var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* PAGER */
.pager{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:24px;padding-top:20px;
  border-top:1px solid var(--glass-border);
}
.pager-btn{
  padding:9px 20px;font-size:13px;font-family:'Outfit',sans-serif;font-weight:500;
  background:var(--glass-bg);backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:var(--radius-pill);
  color:var(--text);cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);
  transition:background 0.15s,border-color 0.15s;
}
.pager-btn:hover{background:var(--glass-bg-hover);border-color:var(--glass-border-bright);}
.pager-btn:disabled{opacity:0.3;cursor:default;}
.pager-info{font-size:13px;color:var(--text3);}

/* MODAL */
.modal-bg{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;
}
@media(min-width:600px){
  .modal-bg{align-items:center;padding:20px;}
  .modal{border-radius:var(--radius-lg) !important;max-height:80vh !important;}
}
.modal{
  background:rgba(15,15,35,0.85);
  backdrop-filter:var(--blur-heavy);-webkit-backdrop-filter:var(--blur-heavy);
  border:1px solid var(--glass-border);
  border-bottom:none;
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  width:100%;max-width:560px;margin:0 auto;
  max-height:90dvh;overflow-y:auto;overscroll-behavior:contain;

  animation:rise 0.3s cubic-bezier(0.32,0.72,0,1);
}
@keyframes rise{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:12px auto 0;}
.modal-head{display:flex;gap:14px;padding:16px 18px 14px;border-bottom:1px solid var(--glass-border);}
.modal-set-img{width:84px;height:84px;object-fit:contain;background:rgba(255,255,255,0.05);border-radius:14px;padding:8px;flex-shrink:0;border:1px solid var(--glass-border);}
.modal-set-ph{width:84px;height:84px;background:rgba(255,255,255,0.05);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;}
.modal-meta{flex:1;min-width:0;}
.modal-meta h2{font-size:16px;font-weight:600;color:var(--text);line-height:1.25;}
.modal-meta .sub{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.7;}
.modal-x{
  background:rgba(255,255,255,0.08);border:1px solid var(--glass-border);
  width:30px;height:30px;border-radius:50%;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text2);flex-shrink:0;align-self:flex-start;
  transition:background 0.15s;
}
.modal-x:hover{background:rgba(255,255,255,0.15);}
.modal-body{padding:18px;}
.modal-body h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:14px;}
.instr-card{
  display:flex;align-items:center;gap:14px;
  padding:12px 14px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--glass-border);
  border-radius:14px;margin-bottom:8px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
  transition:background 0.15s;
}
.instr-card:hover{background:rgba(255,255,255,0.09);}
.instr-icon{
  width:44px;height:44px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(79,168,255,0.25),rgba(167,139,250,0.25));
  border:1px solid rgba(79,168,255,0.2);
  border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;
}
.instr-info{flex:1;min-width:0;}
.instr-info strong{font-size:13px;font-weight:500;color:var(--text);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.instr-info span{font-size:11px;color:var(--text3);}
.instr-open{
  padding:7px 14px;font-size:12px;font-family:'Outfit',sans-serif;font-weight:600;
  background:linear-gradient(135deg,rgba(79,168,255,0.7),rgba(167,139,250,0.7));

  transition:opacity 0.15s;
}
.instr-open:hover{opacity:0.85;}
.empty-state{text-align:center;padding:24px 0;color:var(--text3);font-size:13px;}
.empty-state a{color:var(--accent);text-decoration:none;}

/* INSTALL BANNER */
.install-bar{
  display:none;align-items:center;gap:10px;padding:10px 16px;
  background:linear-gradient(135deg,rgba(79,168,255,0.15),rgba(167,139,250,0.15));
  border-bottom:1px solid var(--glass-border);font-size:13px;color:var(--text2);
}
.install-bar button{
  padding:6px 14px;font-size:12px;font-family:'Outfit',sans-serif;font-weight:600;

}
.install-bar .ix{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0;margin-left:0;}
</style>

window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBar').style.display='flex';});
document.getElementById('installBtn').onclick=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('installBar').style.display='none';};
document.getElementById('dismissBar').onclick=()=>{document.getElementById('installBar').style.display='none';};

async function api(prompt){
  const r=await fetch(CLAUDE,{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})
  });
  const d=await r.json();
  return d.content.filter(b=>b.type==='text').map(b=>b.text).join('')||'';
}

async function loadSets(p,q){
  document.getElementById('grid').innerHTML='<div class="loader"><div class="spin"></div><p class="loader-text">Sets laden…</p></div>';
  document.getElementById('pager').style.display='none';
  const off=(p-1)*PAGE;
  const term=q||'popular lego sets 2024 2025';
  const prompt=`Search rebrickable.com for LEGO sets matching "${term}". Return ONLY valid JSON no markdown:
{"total":500,"sets":[{"set_num":"42196-1","name":"Name","year":2024,"num_parts":500,"img":"https://cdn.rebrickable.com/media/sets/..."}]}
Return ${PAGE} sets at offset ${off}. Real Rebrickable data only. img = real URL or empty.`;
  try{
    let raw=await api(prompt);
    raw=raw.replace(/```json|```/g,'').trim();
    const s=raw.indexOf('{'),e=raw.lastIndexOf('}');
    if(s<0)throw 0;
    const j=JSON.parse(raw.slice(s,e+1));
    total=j.total||100;
    renderGrid(j.sets||[]);
    renderPager(p,total);
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="loader"><p class="loader-text">Niets gevonden. Probeer een andere zoekopdracht.</p></div>';
  }
}

function renderGrid(sets){
  if(!sets.length){document.getElementById('grid').innerHTML='<div class="loader"><p class="loader-text">Geen sets gevonden.</p></div>';return;}
  document.getElementById('grid').innerHTML=sets.map(s=>`
    <div class="card" onclick='openSet(${JSON.stringify(s).replace(/'/g,"&#39;")})'>
      ${s.img?`<img class="card-img" src="${s.img}" loading="lazy" onerror="this.outerHTML='<div class=card-img-ph>🧱</div>'"/>`:'<div class="card-img-ph">🧱</div>'}
      <div class="card-body">
        <div class="card-num">${s.set_num||''}</div>
        <div class="card-name">${s.name}</div>
        <div class="card-meta">
          ${s.num_parts?`<span class="pill">${s.num_parts} stuks</span>`:''}
          ${s.year?`<span class="pill pill-year">${s.year}</span>`:''}
        </div>
      </div>
    </div>`).join('');
}

function renderPager(p,tot){
  const pages=Math.ceil(tot/PAGE);if(pages<=1)return;
  const from=(p-1)*PAGE+1,to=Math.min(p*PAGE,tot);
  const el=document.getElementById('pager');el.style.display='flex';
  el.innerHTML=`<button class="pager-btn" onclick="go(${p-1})" ${p<=1?'disabled':''}>← Vorige</button><span class="pager-info">${from}–${to} van ${tot}</span><button class="pager-btn" onclick="go(${p+1})" ${p>=pages?'disabled':''}>Volgende →</button>`;
}

function go(p){page=p;loadSets(page,query);window.scrollTo({top:0,behavior:'smooth'});}

async function openSet(s){
  const modal=document.getElementById('modal');
  modal.style.display='flex';modal.className='modal-bg';
  const imgH=s.img?`<img class="modal-set-img" src="${s.img}" onerror="this.outerHTML='<div class=modal-set-ph>🧱</div>'">`:'<div class="modal-set-ph">🧱</div>';
  modal.innerHTML=`<div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      ${imgH}
      <div class="modal-meta">
        <h2>${s.name}</h2>
        <div class="sub">Set ${s.set_num||''}${s.year?' · '+s.year:''}${s.num_parts?'<br>'+s.num_parts+' onderdelen':''}</div>
      </div>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <h3>Bouwinstructies</h3>
      <div class="loader"><div class="spin"></div><p class="loader-text">Zoeken…</p></div>
    </div>
  </div>`;
  const num=(s.set_num||'').replace(/-1$/,'');
  const prompt=`Find official PDF building instructions for LEGO set ${num} "${s.name}" on lego.com.
Return ONLY JSON array (no markdown):
[{"title":"Boekje 1","pages":120,"url":"https://www.lego.com/cdn/..."}]
Real lego.com CDN PDF URLs only. Multiple booklets if applicable. Empty array [] if none.`;
  try{
    let raw=await api(prompt);
    raw=raw.replace(/```json|```/g,'').trim();
    const s2=raw.indexOf('['),e2=raw.lastIndexOf(']');
    const ins=s2>=0?JSON.parse(raw.slice(s2,e2+1)):[];
    const body=modal.querySelector('.modal-body');
    if(!ins.length){
      body.innerHTML=`<h3>Bouwinstructies</h3><div class="instr-card"><div class="instr-icon">📘</div><div class="instr-info"><strong>Instructies op LEGO.com</strong><span>Officiële pagina</span></div><a class="instr-open" href="https://www.lego.com/nl-nl/service/biservice/buildinginstruction/${num}" target="_blank">Openen</a></div>`;
      return;
    }
    body.innerHTML=`<h3>Bouwinstructies (${ins.length})</h3>`+ins.map((b,i)=>`
      <div class="instr-card">
        <div class="instr-icon">📘</div>
        <div class="instr-info"><strong>${b.title||'Boekje '+(i+1)}</strong><span>${b.pages?b.pages+" pagina's":'Instructieboekje'}</span></div>
        <a class="instr-open" href="${b.url}" target="_blank">Openen</a>
      </div>`).join('');
  }catch(e){
    modal.querySelector('.modal-body').innerHTML=`<h3>Bouwinstructies</h3><p class="empty-state">Kon niet laden. <a href="https://www.lego.com/nl-nl/search?q=${num}" target="_blank">Zoek op LEGO.com</a></p>`;
  }
}

function closeModal(){document.getElementById('modal').style.display='none';}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('searchBtn').onclick=()=>{query=document.getElementById('q').value.trim();page=1;loadSets(page,query);};
document.getElementById('q').onkeydown=e=>{if(e.key==='Enter')document.getElementById('searchBtn').click();};
loadSets(1,'');
</script>
