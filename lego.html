  <style>
    :root {
      --red: #E3000B;
      --red-dark: #b50009;
      --yellow: #FFD700;
      --yellow-light: #FFF3B0;
      --bg: #f7f5f0;
      --surface: #ffffff;
      --surface2: #f2f0eb;
      --text: #1a1a1a;
      --text2: #5a5a5a;
      --text3: #999;
      --border: rgba(0,0,0,0.09);
      --border2: rgba(0,0,0,0.15);
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { background: var(--bg); }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overscroll-behavior: none;
    }
    .app-header {
      background: var(--red);
      color: white;
      padding: env(safe-area-inset-top, 0) 0 0;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 16px rgba(227,0,11,0.25);
    }
    .header-inner { display: flex; align-items: center; gap: 10px; padding: 14px 16px 12px; }
    .logo {
      width: 36px; height: 36px;
      background: var(--yellow);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: var(--red);
      flex-shrink: 0; letter-spacing: -1px;
    }
    .header-title { flex: 1; }
    .header-title h1 { font-size: 18px; font-weight: 900; color: white; line-height: 1; }
    .header-title p { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 1px; }
    .search-wrap { padding: 12px 16px; background: var(--red-dark); }
    .search-box {
      display: flex; gap: 8px;
      background: white; border-radius: 10px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .search-box input {
      flex: 1; padding: 11px 14px; font-size: 15px;
      font-family: 'Nunito', sans-serif;
      border: none; outline: none; background: transparent; color: var(--text);
    }
    .search-box input::placeholder { color: var(--text3); }
    .search-box button {
      padding: 10px 16px; background: var(--red); color: white;
      border: none; font-size: 18px; cursor: pointer;
    }
    .search-box button:active { background: var(--red-dark); }
    main {
      padding: 14px 12px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
      max-width: 800px; margin: 0 auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: var(--shadow);
      -webkit-user-select: none; user-select: none;
    }
    .card:active { transform: scale(0.97); box-shadow: none; }
    .card-img {
      width: 100%; aspect-ratio: 1; object-fit: contain;
      background: #f9f8f5; padding: 10px; display: block;
    }
    .card-img-placeholder {
      width: 100%; aspect-ratio: 1; background: #f9f8f5;
      display: flex; align-items: center; justify-content: center; font-size: 36px;
    }
    .card-body { padding: 10px 12px 12px; }
    .card-num { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; margin-top: 2px; }
    .card-meta { font-size: 11px; color: var(--text2); margin-top: 5px; display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { background: var(--yellow-light); color: #7a5f00; border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 700; }
    .loader { grid-column: 1/-1; text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid var(--border2); border-top-color: var(--red);
      border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pager {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-top: 20px; padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .pager button {
      padding: 8px 18px; font-size: 14px;
      font-family: 'Nunito', sans-serif; font-weight: 700;
      border: 1.5px solid var(--border2); border-radius: 8px;
      background: var(--surface); color: var(--text); cursor: pointer;
    }
    .pager button:active { background: var(--surface2); }
    .pager button:disabled { opacity: 0.35; cursor: default; }
    .pager span { font-size: 13px; color: var(--text2); font-weight: 600; }
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
      z-index: 100; display: flex; align-items: flex-end; padding: 0;
    }
    @media (min-width: 600px) {
      .modal-backdrop { align-items: center; padding: 20px; }
      .modal { border-radius: var(--radius) !important; max-height: 85vh !important; }
    }
    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 560px; margin: 0 auto;
      max-height: 90dvh; overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 0);
      animation: slideUp 0.25s cubic-bezier(0.32,0.72,0,1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 10px auto 0; }
    .modal-header {
      display: flex; gap: 14px; padding: 14px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .modal-set-img {
      width: 80px; height: 80px; object-fit: contain;
      background: #f9f8f5; border-radius: 10px; padding: 6px; flex-shrink: 0;
    }
    .modal-set-img-ph {
      width: 80px; height: 80px; background: #f9f8f5; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0;
    }
    .modal-meta { flex: 1; min-width: 0; }
    .modal-meta h2 { font-size: 16px; font-weight: 900; color: var(--text); line-height: 1.25; }
    .modal-meta .set-info { font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.6; }
    .modal-close {
      background: var(--surface2); border: none; width: 30px; height: 30px;
      border-radius: 50%; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text2); flex-shrink: 0; align-self: flex-start;
    }
    .modal-body { padding: 16px; }
    .modal-body h3 {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text3); margin-bottom: 12px;
    }
    .instr-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; background: var(--surface2);
      border-radius: 10px; margin-bottom: 8px;
    }
    .instr-icon {
      width: 40px; height: 40px; background: var(--red); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
    }
    .instr-text { flex: 1; min-width: 0; }
    .instr-text strong { font-size: 13px; font-weight: 700; color: var(--text); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .instr-text span { font-size: 11px; color: var(--text2); }
    .instr-btn {
      padding: 7px 12px; font-size: 12px; font-family: 'Nunito', sans-serif; font-weight: 700;
      background: var(--red); color: white; border: none; border-radius: 7px;
      text-decoration: none; white-space: nowrap; cursor: pointer; flex-shrink: 0;
    }
    .instr-btn:active { background: var(--red-dark); }
    .empty { font-size: 13px; color: var(--text2); text-align: center; padding: 20px 0; }
    .empty a { color: var(--red); }
    .install-banner {
      background: var(--yellow); color: #5a3e00;
      padding: 10px 16px; display: flex; align-items: center;
      gap: 10px; font-size: 13px; font-weight: 700;
    }
    .install-banner button {
      margin-left: auto; padding: 6px 14px; background: var(--red); color: white;
      border: none; border-radius: 6px; font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 12px; cursor: pointer; flex-shrink: 0;
    }
    .install-banner .dismiss {
      background: none; color: #5a3e00; padding: 4px; font-size: 16px;
      flex-shrink: 0; border: none; cursor: pointer;
    }
  </style>

  const swCode = "const CACHE = 'lego-v1';\nconst ASSETS = [\n  '/',\n  '/index.html',\n  '/manifest.json',\n  '/icons/icon-192.png',\n  '/icons/icon-512.png',\n  'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap'\n];\n\nself.addEventListener('install', e => {\n  e.waitUntil(\n    caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting())\n  );\n});\n\nself.addEventListener('activate', e => {\n  e.waitUntil(\n    caches.keys().then(keys =>\n      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))\n    ).then(() => self.clients.claim())\n  );\n});\n\nself.addEventListener('fetch', e => {\n  const url = new URL(e.request.url);\n\n  // Always go network for API calls\n  if (url.hostname === 'api.anthropic.com') {\n    return e.respondWith(fetch(e.request));\n  }\n\n  // Cache-first for fonts and static assets\n  if (url.hostname === 'fonts.googleapis.com' || url.hostname === 'fonts.gstatic.com') {\n    e.respondWith(\n      caches.match(e.request).then(cached => cached || fetch(e.request).then(res => {\n        const clone = res.clone();\n        caches.open(CACHE).then(c => c.put(e.request, clone));\n        return res;\n      }))\n    );\n    return;\n  }\n\n  // Network-first for same-origin\n  if (url.origin === self.location.origin) {\n    e.respondWith(\n      fetch(e.request)\n        .then(res => {\n          const clone = res.clone();\n          caches.open(CACHE).then(c => c.put(e.request, clone));\n          return res;\n        })\n        .catch(() => caches.match(e.request))\n    );\n  }\n});\n";
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register(swUrl, {scope: '.'}).catch(() => {});
  }
})();

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'flex';
});
document.getElementById('installBtn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').style.display = 'none';
};
document.getElementById('dismissInstall').onclick = () => {
  document.getElementById('installBanner').style.display = 'none';
};
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').style.display = 'none';
});

async function askClaude(prompt) {
  const r = await fetch(CLAUDE, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: prompt }]
    })
  });
  const d = await r.json();
  return d.content.filter(b => b.type === "text").map(b => b.text).join("") || "";
}

async function loadSets(p, q) {
  document.getElementById('grid').innerHTML = '<div class="loader"><div class="spinner"></div><br/>Sets laden…</div>';
  document.getElementById('pager').style.display = 'none';
  const offset = (p - 1) * PAGE;
  const term = q || "populaire lego sets nieuw";
  const prompt = `Search rebrickable.com/sets/ for LEGO sets matching "${term}".
Return ONLY valid JSON (no markdown, no explanation):
{"total":200,"sets":[{"set_num":"42196-1","name":"Set naam","year":2024,"num_parts":500,"img":"https://cdn.rebrickable.com/..."}]}
Return exactly ${PAGE} sets starting at offset ${offset}. Use real data from Rebrickable. img must be a real image URL or empty string.`;
  try {
    let raw = await askClaude(prompt);
    raw = raw.replace(/```json|```/g, '').trim();
    const start = raw.indexOf('{'); const end = raw.lastIndexOf('}');
    if (start === -1) throw new Error('no json');
    const json = JSON.parse(raw.slice(start, end + 1));
    total = json.total || 100;
    renderGrid(json.sets || []);
    renderPager(p, total);
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="loader">Niets gevonden. Probeer een andere zoekopdracht.</div>';
  }
}

function renderGrid(sets) {
  if (!sets.length) { document.getElementById('grid').innerHTML = '<div class="loader">Geen sets gevonden.</div>'; return; }
  document.getElementById('grid').innerHTML = sets.map(s => `
    <div class="card" onclick='openSet(${JSON.stringify(s).replace(/'/g,"&#39;")})'>
      ${s.img ? `<img class="card-img" src="${s.img}" alt="${s.name}" loading="lazy" onerror="this.outerHTML='<div class=card-img-placeholder>🧱</div>'"/>` : '<div class="card-img-placeholder">🧱</div>'}
      <div class="card-body">
        <div class="card-num">${s.set_num || ''}</div>
        <div class="card-name">${s.name}</div>
        <div class="card-meta">
          ${s.num_parts ? `<span class="badge">${s.num_parts} stuks</span>` : ''}
          ${s.year ? `<span style="color:var(--text3)">${s.year}</span>` : ''}
        </div>
      </div>
    </div>`).join('');
}

function renderPager(p, tot) {
  const pages = Math.ceil(tot / PAGE);
  if (pages <= 1) return;
  const from = (p-1)*PAGE+1, to = Math.min(p*PAGE, tot);
  const el = document.getElementById('pager');
  el.style.display = 'flex';
  el.innerHTML = `
    <button onclick="go(${p-1})" ${p<=1?'disabled':''}>← Vorige</button>
    <span>${from}–${to} van ${tot}</span>
    <button onclick="go(${p+1})" ${p>=pages?'disabled':''}>Volgende →</button>`;
}

function go(p) { page = p; loadSets(page, query); window.scrollTo({top:0,behavior:'smooth'}); }

async function openSet(s) {
  const modal = document.getElementById('modal');
  modal.style.display = 'flex';
  modal.className = 'modal-backdrop';
  const imgHtml = s.img
    ? `<img class="modal-set-img" src="${s.img}" alt="${s.name}" onerror="this.outerHTML='<div class=modal-set-img-ph>🧱</div>'"/>`
    : `<div class="modal-set-img-ph">🧱</div>`;
  modal.innerHTML = `<div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      ${imgHtml}
      <div class="modal-meta">
        <h2>${s.name}</h2>
        <div class="set-info">Set ${s.set_num || ''}${s.year ? ' &middot; ' + s.year : ''}${s.num_parts ? '<br/>' + s.num_parts + ' onderdelen' : ''}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <h3>Bouwinstructies</h3>
      <div class="loader"><div class="spinner"></div><br/>Instructies zoeken…</div>
    </div>
  </div>`;

  const setNum = (s.set_num || '').replace(/-1$/, '');
  const prompt = `Search for official PDF building instructions for LEGO set ${setNum} "${s.name}".
Look on lego.com for instruction PDFs. Many sets have multiple booklets.
Return ONLY a JSON array (no markdown):
[{"title":"Boekje 1","pages":120,"url":"https://..."},{"title":"Boekje 2","pages":80,"url":"https://..."}]
Use real direct PDF URLs from lego.com CDN. If exact PDFs not found, provide the lego.com instructions page URL.
Return empty array [] if truly nothing found.`;

  try {
    let raw = await askClaude(prompt);
    raw = raw.replace(/```json|```/g, '').trim();
    const start = raw.indexOf('['); const end = raw.lastIndexOf(']');
    const instrs = start !== -1 ? JSON.parse(raw.slice(start, end+1)) : [];
    const body = modal.querySelector('.modal-body');
    if (!instrs.length) {
      body.innerHTML = `<h3>Bouwinstructies</h3>
        <div class="instr-item">
          <div class="instr-icon">📘</div>
          <div class="instr-text"><strong>Instructies op LEGO.com</strong><span>Officiële instructiepagina</span></div>
          <a class="instr-btn" href="https://www.lego.com/nl-nl/service/biservice/buildinginstruction/${setNum}" target="_blank">Openen</a>
        </div>`;
      return;
    }
    body.innerHTML = `<h3>Bouwinstructies (${instrs.length})</h3>` + instrs.map((b,i) => `
      <div class="instr-item">
        <div class="instr-icon">📘</div>
        <div class="instr-text">
          <strong>${b.title || 'Boekje '+(i+1)}</strong>
          <span>${b.pages ? b.pages + " pagina's" : 'Instructieboekje'}</span>
        </div>
        <a class="instr-btn" href="${b.url}" target="_blank">Openen</a>
      </div>`).join('');
  } catch(e) {
    modal.querySelector('.modal-body').innerHTML = `<h3>Bouwinstructies</h3><p class="empty">Kon niet laden. <a href="https://www.lego.com/nl-nl/search?q=${setNum}" target="_blank">Zoek op LEGO.com</a></p>`;
  }
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
document.getElementById('modal').addEventListener('click', e => { if(e.target === document.getElementById('modal')) closeModal(); });
document.getElementById('searchBtn').onclick = () => {
  query = document.getElementById('q').value.trim();
  page = 1; loadSets(page, query);
};
document.getElementById('q').onkeydown = e => { if(e.key==='Enter') document.getElementById('searchBtn').click(); };

loadSets(1, '');
</script>
