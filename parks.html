<!DOCTYPE html>
<!-- saved from url=(0071)file:///Users/dieter.cafmeyer/Downloads/kraken-widget-parks-only_1.html -->
<html lang="nl"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZXT Kraken Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=DM+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 480px; height: 480px; overflow: hidden; background: #000; }

  #canvas {
    width: 480px; height: 480px; border-radius: 50%;
    position: relative; overflow: hidden;
    font-family: 'Inter', sans-serif; background: #000;
  }

  #rgb-ring { position: absolute; inset: 0; border-radius: 50%; z-index: 0; }
  #rgb-ring::before {
    content: ''; position: absolute; inset: -6px; border-radius: 50%;
    background: conic-gradient(#ff0080 0deg,#ff4400 45deg,#ffff00 90deg,#00ff80 135deg,#00ffff 180deg,#0080ff 225deg,#8000ff 270deg,#ff0080 360deg);
    animation: spin 3s linear infinite;
  }
  #rgb-ring::after { content: ''; position: absolute; inset: 12px; border-radius: 50%; background: #000; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #display {
    position: absolute; inset: 12px; border-radius: 50%; z-index: 2; overflow: hidden;
    background: radial-gradient(circle at 50% 35%, #080820 0%, #020208 70%);
    display: flex; align-items: center; justify-content: center;
  }
  #display::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,200,255,0.012) 3px, rgba(0,200,255,0.012) 4px);
    pointer-events: none; z-index: 50;
  }

  .grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(0,200,255,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,0.035) 1px, transparent 1px);
    background-size: 32px 32px;
    animation: gridpulse 5s ease-in-out infinite;
  }
  @keyframes gridpulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  .corner { position: absolute; width: 20px; height: 20px; }
  .corner.tl { top:52px; left:82px; border-top:1px solid rgba(0,255,255,.35); border-left:1px solid rgba(0,255,255,.35); }
  .corner.tr { top:52px; right:82px; border-top:1px solid rgba(0,255,255,.35); border-right:1px solid rgba(0,255,255,.35); }
  .corner.bl { bottom:52px; left:82px; border-bottom:1px solid rgba(0,255,255,.35); border-left:1px solid rgba(0,255,255,.35); }
  .corner.br { bottom:52px; right:82px; border-bottom:1px solid rgba(0,255,255,.35); border-right:1px solid rgba(0,255,255,.35); }

  /* ===== SCREENS ===== */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .7s ease; pointer-events: none;
  }
  .screen.active { opacity: 1; }

  /* ===== PARK SCHERM ===== */
  .park-tag { font-family:'DM Mono',monospace; font-size:12px; font-weight:400; letter-spacing:3px; color:rgba(0,255,255,.45); margin-bottom:5px; }
  .park-name {
    font-family:'Inter',sans-serif; font-size:26px; font-weight:700; text-align:center; color:#fff;
    text-shadow:0 0 18px rgba(0,255,255,.9), 0 0 40px rgba(0,255,255,.35);
    line-height:1.2; margin-bottom:12px; max-width:300px; letter-spacing:-.5px;
  }
  .rides { width:300px; margin-top:4px; }
  .ride-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid rgba(255,255,255,.06); }
  .ride-n { font-family:'Inter',sans-serif; font-size:15px; font-weight:400; color:rgba(255,255,255,.6); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:225px; }
  .ride-w { font-family:'DM Mono',monospace; font-size:16px; font-weight:500; min-width:42px; text-align:right; }
  .c-green  { color:#00ff80; text-shadow:0 0 8px #00ff80; }
  .c-yellow { color:#ffdd00; text-shadow:0 0 8px #ffdd00; }
  .c-orange { color:#ff8800; text-shadow:0 0 8px #ff8800; }
  .c-red    { color:#ff2244; text-shadow:0 0 8px #ff2244; }

  /* ===== DRUKTE + WEER SCHERM ===== */
  .info-park-name {
    font-family:'Inter',sans-serif; font-size:22px; font-weight:700; text-align:center; color:#fff;
    text-shadow:0 0 18px rgba(0,255,255,.9); line-height:1.2; margin-bottom:22px; letter-spacing:-.5px;
  }

  /* Drukte meter */
  .crowd-label { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:3px; color:rgba(0,255,255,.4); margin-bottom:10px; }
  .crowd-bar-wrap { width:260px; margin-bottom:6px; }
  .crowd-track { height:8px; background:rgba(255,255,255,.07); border-radius:4px; overflow:hidden; }
  .crowd-fill {
    height:100%; border-radius:4px;
    transition: width 1.2s cubic-bezier(.4,0,.2,1), background 1s;
  }
  .crowd-text { font-family:'Inter',sans-serif; font-size:28px; font-weight:700; margin-top:6px; letter-spacing:-.5px; }
  .crowd-sub  { font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,.3); letter-spacing:2px; margin-top:2px; }

  /* Divider */
  .divider { width:240px; height:1px; background:rgba(255,255,255,.07); margin:18px 0; }

  /* Weer */
  .weather-row { display:flex; align-items:center; gap:16px; }
  .weather-icon { font-size:42px; line-height:1; }
  .weather-info { display:flex; flex-direction:column; gap:4px; }
  .weather-temp { font-family:'Inter',sans-serif; font-size:38px; font-weight:700; color:#fff; letter-spacing:-1px; line-height:1; }
  .weather-desc { font-family:'DM Mono',monospace; font-size:11px; color:rgba(0,255,255,.5); letter-spacing:2px; }
  .weather-extra { font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,.3); letter-spacing:1px; }

  /* ===== LOADING ===== */
  #loading { position:absolute; inset:0; border-radius:50%; background:#000; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .8s; }
  .load-brand { font-family:'Inter',sans-serif; font-size:13px; font-weight:600; letter-spacing:8px; color:rgba(0,255,255,.5); margin-bottom:22px; }
  .load-spin { width:44px; height:44px; border:2px solid rgba(0,255,255,.1); border-top-color:#00ffff; border-radius:50%; animation:spin .8s linear infinite; }
  .load-txt { margin-top:14px; font-family:'DM Mono',monospace; font-size:10px; color:rgba(0,255,255,.4); letter-spacing:3px; }
</style>
</head>
<body>
<div id="canvas">
  <div id="rgb-ring"></div>
  <div id="display">
    <div class="grid"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div id="loading" style="opacity: 0; display: none;">
      <div class="load-brand">NZXT</div>
      <div class="load-spin"></div>
      <div class="load-txt">OPHALEN...</div>
    </div>

    <!-- PARK: wachttijden -->
    <div class="screen" id="s-park">
      <div class="park-tag">WACHTTIJDEN • LIVE</div>
      <div class="park-name" id="park-name">Parc Astérix</div>
      <div class="rides" id="rides-list"><div style="font-family: &quot;DM Mono&quot;, monospace; font-size: 13px; color: rgba(0, 255, 255, 0.3); text-align: center; padding: 24px 0px; letter-spacing: 3px;">GESLOTEN</div></div>
    </div>

    <!-- INFO: drukte + weer -->
    <div class="screen active" id="s-info">
      <div class="info-park-name" id="info-park-name">Parc Astérix</div>
      <div class="crowd-label">DRUKTE</div>
      <div class="crowd-bar-wrap">
        <div class="crowd-track"><div class="crowd-fill" id="crowd-fill" style="width: 0%; background: linear-gradient(90deg, rgba(255, 221, 0, 0.533), rgb(255, 221, 0)); box-shadow: rgba(255, 221, 0, 0.533) 0px 0px 12px;"></div></div>
      </div>
      <div class="crowd-text" id="crowd-text" style="color: rgba(255, 255, 255, 0.3); text-shadow: rgba(255, 255, 255, 0.3) 0px 0px 20px;">ONBEKEND</div>
      <div class="crowd-sub" id="crowd-sub"></div>
      <div class="divider"></div>
      <div class="weather-row">
        <div class="weather-icon" id="wx-icon">⛅</div>
        <div class="weather-info">
          <div class="weather-temp" id="wx-temp">15°C</div>
          <div class="weather-desc" id="wx-desc">HALF BEWOLKT</div>
          <div class="weather-extra" id="wx-extra">💨 13 km/u  🌧 0 mm</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const PARKS = [
  { id: 'dae968d5-630d-4719-8b06-3d107e944401', name: 'Disneyland Park',       lat: 48.8722, lon: 2.7760 },
  { id: 'ca888437-ebb4-4d50-aed2-d227f7096968', name: 'Disney Adventure World', lat: 48.8722, lon: 2.7760 },
  { id: '30713cf6-69a9-47c9-a505-52bb965f01be', name: 'Efteling',               lat: 51.6503, lon: 5.0481 },
  { id: 'abb67808-61e3-49ef-996c-1b97ed64fac6', name: 'Phantasialand',          lat: 50.7989, lon: 6.8794 },
  { id: '9e938687-fd99-46f3-986a-1878210378f8', name: 'Parc Astérix',           lat: 49.1341, lon: 2.5712 },
  { id: 'f0ea9b9c-1ccb-4860-bfe6-b5aea7e4db2b', name: 'Plopsaland Belgium',     lat: 51.0797, lon: 2.5969 },
];

// Rotatie: park → info → volgend park → info → ...
// Elke cyclus toont: wachttijden (8s) + drukte/weer (6s)
const PARK_DURATION = 8000;
const INFO_DURATION = 6000;
const PARK_REFRESH  = 120000;
const WX_REFRESH    = 600000; // 10 min

let parksData    = [];
let weatherCache = {}; // { parkId: { temp, desc, icon, wind, rain } }
let currentPark  = 0;
let phase        = 'park'; // 'park' of 'info'
let phaseTimer   = null;

// ============================================================
// WEER — Open-Meteo (geen API key, geen CORS)
// ============================================================
const WX_CODES = {
  0:  ['☀️','HELDER'],
  1:  ['🌤️','OVERWEGEND HELDER'], 2: ['⛅','HALF BEWOLKT'], 3: ['☁️','BEWOLKT'],
  45: ['🌫️','MIST'], 48: ['🌫️','RIJPMIST'],
  51: ['🌦️','LICHTE MOTREGEN'], 53: ['🌦️','MOTREGEN'], 55: ['🌧️','ZWARE MOTREGEN'],
  61: ['🌧️','LICHTE REGEN'], 63: ['🌧️','REGEN'], 65: ['🌧️','ZWARE REGEN'],
  71: ['🌨️','LICHTE SNEEUW'], 73: ['🌨️','SNEEUW'], 75: ['❄️','ZWARE SNEEUW'],
  80: ['🌦️','BUIEN'], 81: ['🌧️','ZWARE BUIEN'], 82: ['⛈️','HEVIGE BUIEN'],
  95: ['⛈️','ONWEER'], 96: ['⛈️','ONWEER + HAGEL'], 99: ['⛈️','ONWEER + ZWARE HAGEL'],
};

async function fetchWeather(park) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${park.lat}&longitude=${park.lon}&current=temperature_2m,weathercode,windspeed_10m,precipitation&wind_speed_unit=kmh&timezone=auto`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    const json = await r.json();
    const c = json.current;
    const [icon, desc] = WX_CODES[c.weathercode] || ['🌡️', 'ONBEKEND'];
    weatherCache[park.id] = {
      temp: Math.round(c.temperature_2m),
      icon,
      desc,
      wind: Math.round(c.windspeed_10m),
      rain: c.precipitation,
    };
  } catch(e) {
    console.warn('Weer ophalen mislukt voor', park.name, e);
  }
}

async function loadAllWeather() {
  await Promise.all(PARKS.map(fetchWeather));
}

// ============================================================
// DRUKTE berekening op basis van gemiddelde wachttijd
// ============================================================
function getCrowdInfo(rides) {
  if (!rides || rides.length === 0) return { label: 'ONBEKEND', pct: 0, color: 'rgba(255,255,255,.3)' };
  const avg = rides.reduce((s, r) => s + r.wait, 0) / rides.length;
  if (avg < 15)  return { label: 'RUSTIG',     sub: `gem. ${Math.round(avg)} min`, pct: 15,  color: '#00ff80' };
  if (avg < 30)  return { label: 'NORMAAL',    sub: `gem. ${Math.round(avg)} min`, pct: 40,  color: '#00ffff' };
  if (avg < 50)  return { label: 'DRUK',       sub: `gem. ${Math.round(avg)} min`, pct: 65,  color: '#ffdd00' };
  if (avg < 70)  return { label: 'ZEER DRUK',  sub: `gem. ${Math.round(avg)} min`, pct: 82,  color: '#ff8800' };
  return         { label: 'OVERVOL',   sub: `gem. ${Math.round(avg)} min`, pct: 100, color: '#ff2244' };
}

// ============================================================
// PARKS — themeparks.wiki
// ============================================================
async function fetchPark(cfg) {
  try {
    const r = await fetch(`https://api.themeparks.wiki/v1/entity/${cfg.id}/live`);
    if (!r.ok) throw new Error(r.status);
    const json = await r.json();

    const rides = (json.liveData || [])
      .filter(e =>
        e.entityType === 'ATTRACTION' &&
        e.status !== 'CLOSED' &&
        e.status !== 'REFURBISHMENT' &&
        e.queue?.STANDBY?.waitTime != null &&
        e.queue.STANDBY.waitTime >= 0
      )
      .map(e => ({ name: e.name, wait: e.queue.STANDBY.waitTime }))
      .sort((a, b) => b.wait - a.wait);

    if (rides.length === 0) return { ...cfg, rides: [], closed: true };
    return { ...cfg, rides };
  } catch(e) {
    console.warn('Fout bij ophalen park:', cfg.name, e);
    return { ...cfg, rides: [], error: true };
  }
}

async function loadParks() {
  const results = await Promise.all(PARKS.map(fetchPark));
  const valid = results.filter(p => !p.error);
  parksData = valid.length > 0 ? valid : [{ name: 'ALLE PARKEN\nGESLOTEN', rides: [], closed: true }];
  if (currentPark >= parksData.length) currentPark = 0;
  if (phase === 'park') renderPark(currentPark);
  if (phase === 'info') renderInfo(currentPark);
}

// ============================================================
// RENDEREN
// ============================================================
function waitColor(w) {
  if (w < 20) return 'c-green';
  if (w < 40) return 'c-yellow';
  if (w < 65) return 'c-orange';
  return 'c-red';
}

function renderPark(idx) {
  if (!parksData.length) return;
  const p = parksData[idx];
  document.getElementById('park-name').innerHTML = p.name.replace('\n','<br>');

  const list = document.getElementById('rides-list');
  list.innerHTML = '';
  if (p.closed) {
    const row = document.createElement('div');
    row.style.cssText = 'font-family:"DM Mono",monospace;font-size:13px;color:rgba(0,255,255,.3);text-align:center;padding:24px 0;letter-spacing:3px;';
    row.textContent = 'GESLOTEN';
    list.appendChild(row);
    return;
  }
  p.rides.slice(0, 5).forEach(r => {
    const row = document.createElement('div');
    row.className = 'ride-row';
    row.innerHTML = `<span class="ride-n">${r.name}</span><span class="ride-w ${waitColor(r.wait)}">${r.wait}'</span>`;
    list.appendChild(row);
  });
}

function renderInfo(idx) {
  if (!parksData.length) return;
  const p = parksData[idx];
  document.getElementById('info-park-name').innerHTML = p.name.replace('\n','<br>');

  // Drukte
  const crowd = getCrowdInfo(p.rides);
  const fill = document.getElementById('crowd-fill');
  fill.style.width   = crowd.pct + '%';
  fill.style.background = `linear-gradient(90deg, ${crowd.color}88, ${crowd.color})`;
  fill.style.boxShadow   = `0 0 12px ${crowd.color}88`;
  document.getElementById('crowd-text').textContent = crowd.label;
  document.getElementById('crowd-text').style.color = crowd.color;
  document.getElementById('crowd-text').style.textShadow = `0 0 20px ${crowd.color}`;
  document.getElementById('crowd-sub').textContent  = crowd.sub || '';

  // Weer
  const wx = weatherCache[p.id];
  if (wx) {
    document.getElementById('wx-icon').textContent  = wx.icon;
    document.getElementById('wx-temp').textContent  = wx.temp + '°C';
    document.getElementById('wx-desc').textContent  = wx.desc;
    document.getElementById('wx-extra').textContent = `💨 ${wx.wind} km/u  🌧 ${wx.rain} mm`;
  } else {
    document.getElementById('wx-icon').textContent  = '—';
    document.getElementById('wx-temp').textContent  = '—';
    document.getElementById('wx-desc').textContent  = 'GEEN DATA';
    document.getElementById('wx-extra').textContent = '';
  }
}

// ============================================================
// SCHERM ROTATIE: park (8s) → info (6s) → volgend park → ...
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function tick() {
  clearTimeout(phaseTimer);
  if (phase === 'park') {
    // Toon nu info scherm
    phase = 'info';
    renderInfo(currentPark);
    showScreen('s-info');
    phaseTimer = setTimeout(tick, INFO_DURATION);
  } else {
    // Ga naar volgend park
    currentPark = (currentPark + 1) % Math.max(parksData.length, 1);
    phase = 'park';
    renderPark(currentPark);
    showScreen('s-park');
    phaseTimer = setTimeout(tick, PARK_DURATION);
  }
}

// ============================================================
// INIT
// ============================================================
async function init() {
  await Promise.all([loadParks(), loadAllWeather()]);

  const ld = document.getElementById('loading');
  ld.style.opacity = '0';
  setTimeout(() => ld.style.display = 'none', 800);

  renderPark(0);
  showScreen('s-park');
  phaseTimer = setTimeout(tick, PARK_DURATION);

  setInterval(loadParks,    PARK_REFRESH);
  setInterval(loadAllWeather, WX_REFRESH);
}

init();
</script>


</body></html>
