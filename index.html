<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZXT Kraken Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=DM+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 320px; height: 320px; overflow: hidden; background: #000; }

  #canvas {
    width: 320px; height: 320px; border-radius: 50%;
    position: relative; overflow: hidden;
    font-family: 'Inter', sans-serif; background: #000;
  }

  #rgb-ring { position: absolute; inset: 0; border-radius: 50%; z-index: 0; }
  #rgb-ring::before {
    content: ''; position: absolute; inset: -10px; border-radius: 50%;
    background: conic-gradient(#ff0080 0deg,#ff4400 45deg,#ffff00 90deg,#00ff80 135deg,#00ffff 180deg,#0080ff 225deg,#8000ff 270deg,#ff0080 360deg);
    animation: spin 3s linear infinite;
  }
  #rgb-ring::after { content: ''; position: absolute; inset: 8px; border-radius: 50%; background: #000; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #display {
    position: absolute; inset: 8px; border-radius: 50%; z-index: 2; overflow: hidden;
    background: radial-gradient(circle at 50% 35%, #080820 0%, #020208 70%);
    display: flex; align-items: center; justify-content: center;
  }
  #display::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,200,255,0.012) 3px, rgba(0,200,255,0.012) 4px);
    pointer-events: none; z-index: 50;
  }

  .grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(0,200,255,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,0.035) 1px, transparent 1px);
    background-size: 20px 20px;
    animation: gridpulse 5s ease-in-out infinite;
  }
  @keyframes gridpulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  .corner { position: absolute; width: 12px; height: 12px; }
  .corner.tl { top:34px; left:52px; border-top:1px solid rgba(0,255,255,.35); border-left:1px solid rgba(0,255,255,.35); }
  .corner.tr { top:34px; right:52px; border-top:1px solid rgba(0,255,255,.35); border-right:1px solid rgba(0,255,255,.35); }
  .corner.bl { bottom:34px; left:52px; border-bottom:1px solid rgba(0,255,255,.35); border-left:1px solid rgba(0,255,255,.35); }
  .corner.br { bottom:34px; right:52px; border-bottom:1px solid rgba(0,255,255,.35); border-right:1px solid rgba(0,255,255,.35); }

  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .7s ease; pointer-events: none;
  }
  .screen.active { opacity: 1; }

  /* ===== SYS ===== */
  .sys-title { font-family:'DM Mono',monospace; font-size:15px; font-weight:400; letter-spacing:4px; color:rgba(0,255,255,.35); margin-bottom:16px; }
  .metric { width:200px; margin-bottom:14px; }
  .metric-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
  .m-label { font-family:'DM Mono',monospace; font-size:15px; font-weight:400; letter-spacing:2px; color:rgba(255,255,255,.35); }
  .m-val { font-family:'Inter',sans-serif; font-size:30px; font-weight:600; line-height:1; letter-spacing:-1px; }
  .m-unit { font-family:'DM Mono',monospace; font-size:12px; font-weight:300; opacity:.6; margin-left:2px; }
  .bar-track { height:4px; background:rgba(255,255,255,.07); border-radius:2px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; transition:width 1s ease; position:relative; }
  .bar-fill::after { content:''; position:absolute; right:0; top:0; bottom:0; width:6px; background:rgba(255,255,255,.7); border-radius:2px; filter:blur(2px); }
  .cpu-c { color:#00ffff; text-shadow:0 0 16px rgba(0,255,255,.9); }
  .gpu-c { color:#cc00ff; text-shadow:0 0 16px rgba(200,0,255,.9); }
  .cpu-bar { background:linear-gradient(90deg,#0055ff,#00ffff); }
  .gpu-bar { background:linear-gradient(90deg,#7700ff,#ff00ee); }
  .pump-row { display:flex; align-items:center; gap:10px; margin-top:10px; }
  .pump-ico { font-size:16px; color:rgba(0,255,255,.5); animation:spin 2.5s linear infinite; display:inline-block; line-height:1; }
  .pump-lbl { font-family:'DM Mono',monospace; font-size:9px; font-weight:300; color:rgba(255,255,255,.3); letter-spacing:2px; }
  .pump-rpm { font-family:'DM Mono',monospace; font-size:17px; font-weight:500; color:rgba(0,255,255,.8); }

  /* ===== CLOCK ===== */
  .clock-time { font-family:'Inter',sans-serif; font-size:52px; font-weight:700; color:#fff; text-shadow:0 0 24px rgba(0,255,255,1), 0 0 50px rgba(0,255,255,.4); letter-spacing:-1px; line-height:1; }
  .blink { animation:blink 1s step-end infinite; }
  @keyframes blink { 50%{opacity:0} }
  .clock-date { font-family:'DM Mono',monospace; font-size:11px; font-weight:400; color:rgba(0,255,255,.5); letter-spacing:3px; margin-top:10px; }
  .deco { display:flex; align-items:center; gap:8px; margin-top:16px; width:160px; }
  .deco-l { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(0,255,255,.4)); }
  .deco-r { flex:1; height:1px; background:linear-gradient(90deg,rgba(0,255,255,.4),transparent); }
  .deco-d { width:5px; height:5px; border:1px solid rgba(0,255,255,.5); transform:rotate(45deg); box-shadow:0 0 5px rgba(0,255,255,.4); }
</style>
</head>
<body>
<div id="canvas">
  <div id="rgb-ring"></div>
  <div id="display">
    <div class="grid"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <!-- SYS -->
    <div class="screen active" id="s-sys">
      <div class="sys-title">SYSTEEM</div>
      <div class="metric">
        <div class="metric-top"><span class="m-label">CPU GEBRUIK</span><span class="m-val cpu-c" id="cpu-load">—<span class="m-unit">%</span></span></div>
        <div class="bar-track"><div class="bar-fill cpu-bar" id="cpu-load-bar" style="width:0%"></div></div>
      </div>
      <div class="metric">
        <div class="metric-top"><span class="m-label">GPU GEBRUIK</span><span class="m-val gpu-c" id="gpu-load">—<span class="m-unit">%</span></span></div>
        <div class="bar-track"><div class="bar-fill gpu-bar" id="gpu-load-bar" style="width:0%"></div></div>
      </div>
      <div class="pump-row">
        <span class="pump-ico">⟳</span>
        <div><div class="pump-lbl">POMP RPM</div><div class="pump-rpm" id="pump-rpm">— RPM</div></div>
      </div>
    </div>

    <!-- CLOCK -->
    <div class="screen" id="s-clock">
      <div class="clock-time"><span id="ch">00</span><span class="blink">:</span><span id="cm">00</span><span class="blink">:</span><span id="cs">00</span></div>
      <div class="clock-date" id="cdate"></div>
      <div class="deco"><div class="deco-l"></div><div class="deco-d"></div><div class="deco-r"></div></div>
    </div>

  </div>
</div>

<script>
const SCREEN_ORDER    = ['sys', 'clock'];
const SCREEN_DURATION = { sys: 7000, clock: 4000 };

let currentScr = 0;
let scrTimer   = null;

// ============================================================
// CLOCK
// ============================================================
const pad = n => String(n).padStart(2,'0');
const DAYS   = ['ZO','MA','DI','WO','DO','VR','ZA'];
const MONTHS = ['JAN','FEB','MAR','APR','MEI','JUN','JUL','AUG','SEP','OKT','NOV','DEC'];
function tickClock() {
  const d = new Date();
  document.getElementById('ch').textContent = pad(d.getHours());
  document.getElementById('cm').textContent = pad(d.getMinutes());
  document.getElementById('cs').textContent = pad(d.getSeconds());
  document.getElementById('cdate').textContent = DAYS[d.getDay()] + ' ' + pad(d.getDate()) + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}
setInterval(tickClock, 1000);
tickClock();

// ============================================================
// MONITORING
// ============================================================
window.nzxt = window.nzxt || { v1: {} };

function setCPU(temp, load) {
  const el = document.getElementById('cpu-load');
  el.innerHTML = Math.round(load) + '<span class="m-unit">%</span>';
  if      (temp < 55) el.style.color = '#00ff80', el.style.textShadow = '0 0 16px rgba(0,255,128,.9)';
  else if (temp < 70) el.style.color = '#ffdd00', el.style.textShadow = '0 0 16px rgba(255,220,0,.9)';
  else if (temp < 82) el.style.color = '#ff8800', el.style.textShadow = '0 0 16px rgba(255,136,0,.9)';
  else                el.style.color = '#ff2244', el.style.textShadow = '0 0 16px rgba(255,34,68,.9)';
  document.getElementById('cpu-load-bar').style.width = Math.min(load,100)+'%';
}

function setGPU(temp, load) {
  const el = document.getElementById('gpu-load');
  el.innerHTML = Math.round(load) + '<span class="m-unit">%</span>';
  if      (temp < 55) el.style.color = '#00ff80', el.style.textShadow = '0 0 16px rgba(0,255,128,.9)';
  else if (temp < 70) el.style.color = '#ffdd00', el.style.textShadow = '0 0 16px rgba(255,220,0,.9)';
  else if (temp < 82) el.style.color = '#ff8800', el.style.textShadow = '0 0 16px rgba(255,136,0,.9)';
  else                el.style.color = '#ff2244', el.style.textShadow = '0 0 16px rgba(255,34,68,.9)';
  document.getElementById('gpu-load-bar').style.width = Math.min(load,100)+'%';
}

window.nzxt.v1.onMonitoringDataUpdate = (data) => {
  const { cpus, gpus, kraken } = data;
  if (cpus?.[0]) setCPU(cpus[0].temperature||0, cpus[0].processorUsage||0);
  if (gpus?.[0]) setGPU(gpus[0].temperature||0, gpus[0].usage||0);
  if (kraken)    document.getElementById('pump-rpm').textContent = Math.round(kraken.pumpSpeed||0) + ' RPM';
};

// Demo fallback wanneer geen NZXT CAM
(function demoMonitor() {
  let ct=54, gt=62;
  setInterval(() => {
    ct = Math.max(34, Math.min(95, ct+(Math.random()-.47)*2.5));
    gt = Math.max(40, Math.min(95, gt+(Math.random()-.47)*3));
    setCPU(ct, 15+Math.random()*70);
    setGPU(gt, 25+Math.random()*65);
    document.getElementById('pump-rpm').textContent = Math.round(2100+Math.random()*500) + ' RPM';
  }, 2000);
})();

// ============================================================
// SCREEN ROTATION
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
}

function nextScreen() {
  currentScr = (currentScr+1) % SCREEN_ORDER.length;
  const name = SCREEN_ORDER[currentScr];
  showScreen(name);
  clearTimeout(scrTimer);
  scrTimer = setTimeout(nextScreen, SCREEN_DURATION[name]);
}

showScreen('sys');
scrTimer = setTimeout(nextScreen, SCREEN_DURATION['sys']);
</script>
</body>
</html>
