<!DOCTYPE html>

<html lang="nl"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZXT Kraken Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=DM+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 480px;
    height: 480px;
    overflow: hidden;
    background: #000;
  }

  #canvas {
    width: 480px;
    height: 480px;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #000;
  }

  /* RGB spinning border ring */
  #rgb-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    z-index: 0;
  }
  #rgb-ring::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: conic-gradient(
      #ff0080 0deg, #ff4400 45deg, #ffff00 90deg, #00ff80 135deg,
      #00ffff 180deg, #0080ff 225deg, #8000ff 270deg, #ff0080 360deg
    );
    animation: spin 3s linear infinite;
  }
  #rgb-ring::after {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    background: #000;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #display {
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    z-index: 2;
    overflow: hidden;
    background: radial-gradient(circle at 50% 35%, #080820 0%, #020208 70%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #display::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,200,255,0.012) 3px, rgba(0,200,255,0.012) 4px);
    pointer-events: none;
    z-index: 50;
  }

  .grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(0,200,255,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,0.035) 1px, transparent 1px);
    background-size: 32px 32px;
    animation: gridpulse 5s ease-in-out infinite;
  }
  @keyframes gridpulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  .corner { position: absolute; width: 20px; height: 20px; }
  .corner.tl { top:52px; left:82px; border-top:1px solid rgba(0,255,255,.35); border-left:1px solid rgba(0,255,255,.35); }
  .corner.tr { top:52px; right:82px; border-top:1px solid rgba(0,255,255,.35); border-right:1px solid rgba(0,255,255,.35); }
  .corner.bl { bottom:52px; left:82px; border-bottom:1px solid rgba(0,255,255,.35); border-left:1px solid rgba(0,255,255,.35); }
  .corner.br { bottom:52px; right:82px; border-bottom:1px solid rgba(0,255,255,.35); border-right:1px solid rgba(0,255,255,.35); }

  /* ===== SCREENS ===== */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .7s ease; pointer-events: none;
  }
  .screen.active { opacity: 1; }

  /* ===== PARK ===== */
  .park-tag { font-family:'DM Mono',monospace; font-size:12px; font-weight:400; letter-spacing:3px; color:rgba(0,255,255,.45); margin-bottom:5px; text-transform:uppercase; }
  .park-name {
    font-family:'Inter',sans-serif; font-size:26px; font-weight:700; text-align:center; color:#fff;
    text-shadow:0 0 18px rgba(0,255,255,.9), 0 0 40px rgba(0,255,255,.35);
    line-height:1.2; margin-bottom:12px; max-width:300px; letter-spacing:-.5px;
  }

  .rides { width:300px; margin-top:8px; }
  .ride-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid rgba(255,255,255,.06); }
  .ride-n { font-family:'Inter',sans-serif; font-size:15px; font-weight:400; color:rgba(255,255,255,.6); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:225px; }
  .ride-w { font-family:'DM Mono',monospace; font-size:16px; font-weight:500; min-width:42px; text-align:right; }

  .c-green  { color:#00ff80; text-shadow:0 0 8px #00ff80; }
  .c-yellow { color:#ffdd00; text-shadow:0 0 8px #ffdd00; }
  .c-orange { color:#ff8800; text-shadow:0 0 8px #ff8800; }
  .c-red    { color:#ff2244; text-shadow:0 0 8px #ff2244; }

  /* ===== SYS ===== */
  .sys-title { font-family:'DM Mono',monospace; font-size:11px; font-weight:400; letter-spacing:4px; color:rgba(0,255,255,.35); margin-bottom:22px; }
  .metric { width:285px; margin-bottom:18px; }
  .metric-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .m-label { font-family:'DM Mono',monospace; font-size:11px; font-weight:400; letter-spacing:2px; color:rgba(255,255,255,.35); }
  .m-val { font-family:'Inter',sans-serif; font-size:38px; font-weight:600; line-height:1; letter-spacing:-1px; }
  .m-unit { font-family:'DM Mono',monospace; font-size:14px; font-weight:300; opacity:.6; margin-left:3px; }
  .bar-track { height:4px; background:rgba(255,255,255,.07); border-radius:2px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; transition:width 1s ease; position:relative; }
  .bar-fill::after { content:''; position:absolute; right:0; top:0; bottom:0; width:8px; background:rgba(255,255,255,.7); border-radius:2px; filter:blur(2px); }
  .cpu-c { color:#00ffff; text-shadow:0 0 20px rgba(0,255,255,.9); }
  .gpu-c { color:#cc00ff; text-shadow:0 0 20px rgba(200,0,255,.9); }
  .cpu-bar { background:linear-gradient(90deg,#0055ff,#00ffff); }
  .gpu-bar { background:linear-gradient(90deg,#7700ff,#ff00ee); }
  .pump-row { display:flex; align-items:center; gap:12px; margin-top:12px; }
  .pump-ico { font-size:20px; color:rgba(0,255,255,.5); animation:spin 2.5s linear infinite; display:inline-block; line-height:1; }
  .pump-lbl { font-family:'DM Mono',monospace; font-size:10px; font-weight:300; color:rgba(255,255,255,.3); letter-spacing:2px; }
  .pump-rpm { font-family:'DM Mono',monospace; font-size:22px; font-weight:500; color:rgba(0,255,255,.8); }

  /* ===== CLOCK ===== */
  .clock-time { font-family:'Inter',sans-serif; font-size:76px; font-weight:700; color:#fff; text-shadow:0 0 30px rgba(0,255,255,1), 0 0 70px rgba(0,255,255,.4); letter-spacing:-2px; line-height:1; }
  .blink { animation:blink 1s step-end infinite; }
  @keyframes blink { 50%{opacity:0} }
  .clock-date { font-family:'DM Mono',monospace; font-size:14px; font-weight:400; color:rgba(0,255,255,.5); letter-spacing:3px; margin-top:14px; }
  .deco { display:flex; align-items:center; gap:10px; margin-top:22px; width:230px; }
  .deco-l { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(0,255,255,.4)); }
  .deco-r { flex:1; height:1px; background:linear-gradient(90deg,rgba(0,255,255,.4),transparent); }
  .deco-d { width:6px; height:6px; border:1px solid rgba(0,255,255,.5); transform:rotate(45deg); box-shadow:0 0 6px rgba(0,255,255,.4); }

  /* ===== LOADING ===== */
  #loading { position:absolute; inset:0; border-radius:50%; background:#000; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .8s; }
  .load-brand { font-family:'Inter',sans-serif; font-size:13px; font-weight:600; letter-spacing:8px; color:rgba(0,255,255,.5); margin-bottom:22px; }
  .load-spin { width:44px; height:44px; border:2px solid rgba(0,255,255,.1); border-top-color:#00ffff; border-radius:50%; animation:spin .8s linear infinite; }
  .load-txt { margin-top:14px; font-family:'DM Mono',monospace; font-size:10px; font-weight:400; color:rgba(0,255,255,.4); letter-spacing:3px; }
</style>
</head>
<body>
<div id="canvas">
  <div id="rgb-ring"></div>
  <div id="display">
    <div class="grid"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div id="loading" style="opacity: 0; display: none;">
      <div class="load-brand">NZXT</div>
      <div class="load-spin"></div>
      <div class="load-txt">OPHALEN...</div>
    </div>

    <!-- PARK -->
    <div class="screen active" id="s-park">
      <div class="park-tag">WACHTTIJDEN • LIVE</div>
      <div class="park-name" id="park-name">GEEN<br>VERBINDING</div>
      <div class="rides" id="rides-list"><div style="font-family: &quot;DM Mono&quot;, monospace; font-size: 13px; color: rgba(0, 255, 255, 0.3); text-align: center; padding: 24px 0px; letter-spacing: 3px;">GESLOTEN</div></div>
    </div>

    <!-- SYS -->
    <div class="screen" id="s-sys">
      <div class="sys-title">SYSTEEM • LIVE</div>
      <div class="metric">
        <div class="metric-top"><span class="m-label">CPU GEBRUIK</span><span class="m-val cpu-c" id="cpu-load">50<span class="m-unit">%</span></span></div>
        <div class="bar-track"><div class="bar-fill cpu-bar" id="cpu-load-bar" style="width: 50.1773%;"></div></div>
      </div>
      <div class="metric">
        <div class="metric-top"><span class="m-label">GPU GEBRUIK</span><span class="m-val gpu-c" id="gpu-load">51<span class="m-unit">%</span></span></div>
        <div class="bar-track"><div class="bar-fill gpu-bar" id="gpu-load-bar" style="width: 51.3329%;"></div></div>
      </div>
      <div class="pump-row">
        <span class="pump-ico">⟳</span>
        <div><div class="pump-lbl">POMP RPM</div><div class="pump-rpm" id="pump-rpm">2416 RPM</div></div>
      </div>
    </div>

    <!-- CLOCK -->
    <div class="screen" id="s-clock">
      <div class="clock-time"><span id="ch">15</span><span class="blink">:</span><span id="cm">03</span><span class="blink">:</span><span id="cs">30</span></div>
      <div class="clock-date" id="cdate">ZO 22 MAR 2026</div>
      <div class="deco"><div class="deco-l"></div><div class="deco-d"></div><div class="deco-r"></div></div>
    </div>

  </div>
</div>

<script>
// ============================================================
// CONFIG — queue-times.com API
// ============================================================
const PARKS = [
  { id: 160, name: 'Efteling'      },
  { id: 51,  name: 'Europa-Park'   },
  { id: 56,  name: 'Phantasialand' },
  { id: 14,  name: 'Walibi Belgium'},
  { id: 9,   name: 'Parc Astérix'  },
];

const SCREEN_ORDER    = ['park', 'sys', 'clock'];
const SCREEN_DURATION = { park: 9000, sys: 5500, clock: 4500 };
const PARK_REFRESH    = 120000;

let parksData   = [];
let currentPark = 0;
let currentScr  = 0;
let scrTimer    = null;

// ============================================================
// CLOCK
// ============================================================
const pad = n => String(n).padStart(2,'0');
const DAYS   = ['ZO','MA','DI','WO','DO','VR','ZA'];
const MONTHS = ['JAN','FEB','MAR','APR','MEI','JUN','JUL','AUG','SEP','OKT','NOV','DEC'];
function tickClock() {
  const d = new Date();
  document.getElementById('ch').textContent = pad(d.getHours());
  document.getElementById('cm').textContent = pad(d.getMinutes());
  document.getElementById('cs').textContent = pad(d.getSeconds());
  document.getElementById('cdate').textContent = DAYS[d.getDay()] + ' ' + pad(d.getDate()) + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}
setInterval(tickClock, 1000);
tickClock();

// ============================================================
// MONITORING
// ============================================================
window.nzxt = window.nzxt || { v1: {} };

function applyTempColor(el, temp, baseClass) {
  el.className = 'm-val ' + baseClass;
  if      (temp < 55) el.style.color = '#00ff80', el.style.textShadow = '0 0 20px rgba(0,255,128,.9)';
  else if (temp < 70) el.style.color = '#ffdd00', el.style.textShadow = '0 0 20px rgba(255,220,0,.9)';
  else if (temp < 82) el.style.color = '#ff8800', el.style.textShadow = '0 0 20px rgba(255,136,0,.9)';
  else                el.style.color = '#ff2244', el.style.textShadow = '0 0 20px rgba(255,34,68,.9)';
}

function setCPU(temp, load) {
  document.getElementById('cpu-load').innerHTML = Math.round(load) + '<span class="m-unit">%</span>';
  document.getElementById('cpu-load-bar').style.width = Math.min(load,100)+'%';
}
function setGPU(temp, load) {
  document.getElementById('gpu-load').innerHTML = Math.round(load) + '<span class="m-unit">%</span>';
  document.getElementById('gpu-load-bar').style.width = Math.min(load,100)+'%';
}

window.nzxt.v1.onMonitoringDataUpdate = (data) => {
  const { cpus, gpus, kraken } = data;
  if (cpus?.[0]) setCPU(cpus[0].temperature||0, cpus[0].processorUsage||0);
  if (gpus?.[0]) setGPU(gpus[0].temperature||0, gpus[0].usage||0);
  if (kraken)    document.getElementById('pump-rpm').textContent = Math.round(kraken.pumpSpeed||0) + ' RPM';
};

function demoMonitor() {
  let ct=54, gt=62;
  setInterval(() => {
    ct = Math.max(34, Math.min(95, ct+(Math.random()-.47)*2.5));
    gt = Math.max(40, Math.min(95, gt+(Math.random()-.47)*3));
    setCPU(ct, 15+Math.random()*70);
    setGPU(gt, 25+Math.random()*65);
    document.getElementById('pump-rpm').textContent = Math.round(2100+Math.random()*500) + ' RPM';
  }, 2000);
}

// ============================================================
// PARKS — queue-times.com
// ============================================================
function xhrGet(url) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = 8000;
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch(e) { reject(e); }
      } else {
        reject(new Error('HTTP ' + xhr.status));
      }
    };
    xhr.onerror   = () => reject(new Error('Netwerkfout'));
    xhr.ontimeout = () => reject(new Error('Timeout'));
    xhr.send();
  });
}

async function fetchPark(cfg) {
  try {
    const json = await xhrGet(`https://queue-times.com/parks/${cfg.id}/queue_times.json`);

    const allRides = [
      ...(json.rides || []),
      ...((json.lands || []).flatMap(l => l.rides || []))
    ];

    const rides = allRides
      .filter(r => r.is_open && r.wait_time > 0)
      .map(r => ({ name: r.name, wait: r.wait_time }))
      .sort((a, b) => b.wait - a.wait);

    if (rides.length === 0) return { name: cfg.name, rides: [], closed: true };
    return { name: cfg.name, rides };
  } catch(e) {
    console.warn('Fout bij ophalen park:', cfg.name, e);
    return { name: cfg.name, rides: [], error: true };
  }
}

async function loadParks() {
  const results = await Promise.all(PARKS.map(fetchPark));

  // Toon alle parken waarvoor de API werkte (open én gesloten), sla alleen errors over
  const validParks = results.filter(p => !p.error);

  if (validParks.length > 0) {
    parksData = validParks;
    if (currentPark >= parksData.length) currentPark = 0;
  } else {
    // API totaal niet bereikbaar
    parksData = [{ name: 'GEEN\nVERBINDING', rides: [], closed: true }];
    currentPark = 0;
  }

  renderPark(currentPark);
}

function waitColor(w) {
  if (w<20) return 'c-green';
  if (w<40) return 'c-yellow';
  if (w<65) return 'c-orange';
  return 'c-red';
}

function renderPark(idx) {
  if (!parksData.length) return;
  currentPark = ((idx%parksData.length)+parksData.length)%parksData.length;
  const p = parksData[currentPark];

  document.getElementById('park-name').innerHTML = p.name.replace('\n','<br>');

  const list = document.getElementById('rides-list');
  list.innerHTML = '';

  if (p.closed) {
    const row = document.createElement('div');
    row.style.cssText = 'font-family:"DM Mono",monospace;font-size:13px;color:rgba(0,255,255,.3);text-align:center;padding:24px 0;letter-spacing:3px;';
    row.textContent = 'GESLOTEN';
    list.appendChild(row);
    return;
  }

  p.rides.slice(0,5).forEach(r => {
    const row = document.createElement('div');
    row.className = 'ride-row';
    row.innerHTML = `<span class="ride-n">${r.name}</span><span class="ride-w ${waitColor(r.wait)}">${r.wait}'</span>`;
    list.appendChild(row);
  });
}

// ============================================================
// SCREEN ROTATION
// ============================================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
}

function nextScreen() {
  currentScr = (currentScr+1)%SCREEN_ORDER.length;
  const name = SCREEN_ORDER[currentScr];
  showScreen(name);
  if (name==='park') {
    currentPark = (currentPark+1)%Math.max(parksData.length,1);
    renderPark(currentPark);
  }
  clearTimeout(scrTimer);
  scrTimer = setTimeout(nextScreen, SCREEN_DURATION[name]);
}

// ============================================================
// INIT
// ============================================================
async function init() {
  demoMonitor();
  await loadParks();

  const ld = document.getElementById('loading');
  ld.style.opacity='0';
  setTimeout(()=>ld.style.display='none', 800);

  showScreen('park');
  scrTimer = setTimeout(nextScreen, SCREEN_DURATION['park']);
  setInterval(loadParks, PARK_REFRESH);
}

init();
</script>


</body></html>
